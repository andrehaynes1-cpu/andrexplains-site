[[redirects]]
  from = "/posts/:slug"
  to = "/post.html"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

[[redirects]]
  from = "/feed.xml"
  to = "/.netlify/functions/feed"
  status = 200

[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/**"]

[functions."generate-post"]
  timeout = 26

[functions."sitemap"]
  timeout = 10

# ══════════════════════════════════════
# SECURITY HEADERS — All pages
# ══════════════════════════════════════
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent site from being embedded in iframes (stops clickjacking)
    X-Frame-Options = "DENY"
    # Prevent MIME type sniffing attacks
    X-Content-Type-Options = "nosniff"
    # Enable XSS protection in older browsers
    X-XSS-Protection = "1; mode=block"
    # Control what info is sent when clicking links
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Block camera, mic, location access (you don't need these)
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    # Content Security Policy — prevents injected scripts, only allows your trusted sources
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com https://news.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https: http:; connect-src 'self' https://*.supabase.co https://www.google-analytics.com https://api.anthropic.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://formsubmit.co"
    # Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Admin page — extra protection, never cached
[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"
    Pragma = "no-cache"
    X-Robots-Tag = "noindex, nofollow"

# Block access to hidden files
[[redirects]]
  from = "/.*"
  to = "/404.html"
  status = 404

# Block common attack paths
[[redirects]]
  from = "/wp-admin/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/wp-login.php"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/.git/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/phpmyadmin/*"
  to = "/404.html"
  status = 404

[[redirects]]
  from = "/wp-content/*"
  to = "/404.html"
  status = 404
