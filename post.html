  /* THEME TOGGLE */
  .theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;margin-left:8px}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;line-height:1.7;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:.4}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:900;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:64px;background:rgba(8,8,8,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
  
  /* READING PROGRESS BAR */
  .reading-progress{position:fixed;top:64px;left:0;width:0%;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:899;transition:width .1s}
  
  /* SHARE BUTTONS */
  .share-bar{display:flex;align-items:center;gap:8px;padding:12px 0;margin:24px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);flex-wrap:wrap}
  .share-bar-label{font-family:var(--font-mono);font-size:13px;color:var(--text);text-transform:uppercase;letter-spacing:2px;font-weight:700}
  .share-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border:2px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font-body);font-size:14px;cursor:pointer;transition:all .2s;font-weight:500;text-decoration:none;border-radius:4px}
  .share-btn:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(0,212,255,.05)}
  .share-btn.copied{border-color:var(--accent);color:var(--accent);background:rgba(232,255,0,.05)}
  
  /* FLOATING TOC + READING TRACKER (mobile) */
  .float-tools{position:fixed;bottom:20px;right:16px;z-index:800;display:flex;flex-direction:column;gap:8px}
  .float-btn{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;border:2px solid var(--border2);backdrop-filter:blur(10px);transition:all .2s}
  .float-btn:hover{border-color:var(--accent);transform:scale(1.1)}
  .float-toc-btn{background:rgba(8,8,8,.92);color:var(--accent2)}
  .float-top-btn{background:rgba(8,8,8,.92);color:var(--accent)}
  .float-time{background:rgba(8,8,8,.92);color:var(--text);font-size:13px;font-family:var(--font-mono);font-weight:700;width:auto;border-radius:24px;padding:8px 14px;height:auto}
  
  /* FLOATING TOC PANEL */
  .float-toc-panel{position:fixed;bottom:80px;right:16px;z-index:801;background:rgba(8,8,8,.97);border:1px solid var(--border);border-radius:12px;padding:16px;max-width:280px;max-height:60vh;overflow-y:auto;display:none;backdrop-filter:blur(20px)}
  .float-toc-panel.open{display:block}
  .float-toc-panel a{display:block;padding:8px 0;color:var(--text2);text-decoration:none;font-size:15px;border-bottom:1px solid rgba(255,255,255,.05);transition:color .2s}
  .float-toc-panel a:hover{color:var(--accent)}
  .float-toc-panel a:last-child{border-bottom:none}
  
  /* WHAT TO READ NEXT — single big card */
  .read-next{background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(0,212,255,.05));border:1px solid rgba(99,102,241,.2);padding:24px;margin:40px 0 24px}
  .read-next-label{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
  .read-next a{text-decoration:none}
  .read-next-title{font-family:var(--font-display);font-size:24px;letter-spacing:1px;color:var(--text);line-height:1.1;margin-bottom:6px;transition:color .2s}
  .read-next a:hover .read-next-title{color:var(--accent)}
  .read-next-meta{font-size:12px;color:var(--text3)}
  .nav-logo{font-family:var(--font-display);font-size:24px;letter-spacing:2px;color:var(--text);text-decoration:none;display:flex;align-items:center;gap:10px}
  .nav-logo span{color:var(--accent)}
  .pulse{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .nav-links{display:flex;align-items:center;gap:28px;list-style:none}
  .nav-links a{color:var(--text2);text-decoration:none;font-size:13px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover{color:var(--accent)}
  .nav-cta{background:var(--accent)!important;color:#000!important;padding:8px 20px;font-weight:700!important}
  .nav-cta:hover{background:#fff!important}

  /* BREADCRUMB */
  .breadcrumb{max-width:1100px;margin:0 auto;padding:96px 40px 0;display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;color:var(--text3)}
  .breadcrumb a{color:var(--text3);text-decoration:none;transition:color .2s}
  .breadcrumb a:hover{color:var(--accent)}
  .breadcrumb span{color:var(--text3)}

  /* ARTICLE LAYOUT */
  .article-layout{max-width:1100px;margin:0 auto;padding:32px 40px 80px;display:grid;grid-template-columns:1fr 300px;gap:60px;align-items:start}

  /* ARTICLE MAIN */
  .article-main{}

  /* ARTICLE HEADER */
  .article-header{margin-bottom:40px}
  .article-category{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;background:rgba(232,255,0,.07);padding:4px 12px;border:1px solid rgba(232,255,0,.15);display:inline-block;margin-bottom:20px}
  .article-title{font-family:var(--font-display);font-size:clamp(40px,6vw,72px);letter-spacing:1px;line-height:.95;margin-bottom:24px;color:var(--text)}
  .article-meta{display:flex;align-items:center;flex-wrap:wrap;gap:12px 24px;padding:16px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:13px;color:#aaaaaa}
  .article-meta .by{color:var(--text2)}

  /* SEO META BOX */
  .seo-box{background:linear-gradient(135deg,rgba(232,255,0,.04),rgba(232,255,0,.01));border:2px solid rgba(232,255,0,.2);border-left:4px solid var(--accent);padding:18px 22px;margin-bottom:40px;display:flex;gap:14px;align-items:flex-start;border-radius:4px}
  .seo-box-icon{font-size:22px;flex-shrink:0;margin-top:2px}
  .seo-box-label{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-weight:700}
  .seo-box-text{font-size:16px;color:var(--text);line-height:1.6;font-family:var(--font-mono)}

  /* ARTICLE BODY */
  .article-body{font-size:19px;color:#d4d4d4;line-height:2}
  .article-body p{margin-bottom:22px}
  .article-body strong{color:var(--text);font-weight:700}
  .article-body em{color:var(--accent);font-style:italic}

  /* Author photo */
  .author-photo{width:100%;aspect-ratio:1;object-fit:cover;object-position:top;display:block;border:2px solid var(--accent)}
  .author-photo-placeholder{width:100%;aspect-ratio:1;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:72px;color:#000}
  .author-bio-card{background:var(--bg3);border:1px solid var(--border);border-left:3px solid var(--accent);padding:32px;margin:48px 0;display:grid;grid-template-columns:140px 1fr;gap:28px;align-items:start}
  .author-bio-img{width:140px;flex-shrink:0}
  .author-bio-img img{width:140px;height:140px;object-fit:cover;object-position:top;display:block;border:2px solid var(--accent)}
  .author-bio-img .placeholder{width:140px;height:140px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:56px;color:#000}
  .author-bio-label{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
  .author-bio-name{font-family:var(--font-display);font-size:32px;letter-spacing:1px;color:var(--text);margin-bottom:4px;line-height:1}
  .author-bio-handle{font-family:var(--font-mono);font-size:12px;color:var(--accent2);margin-bottom:14px}
  .author-bio-text{font-size:14px;color:var(--text2);line-height:1.7;margin-bottom:18px}
  .author-bio-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#000;font-family:var(--font-display);font-size:16px;letter-spacing:2px;padding:8px 20px;text-decoration:none;transition:background .2s}
  .author-bio-btn:hover{background:#fff}
  .sidebar-author-photo{width:100%;aspect-ratio:1;overflow:hidden;margin-bottom:16px;border:2px solid var(--accent)}
  .sidebar-author-photo img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
  .sidebar-author-photo .placeholder{width:100%;padding-top:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));position:relative}
  .sidebar-author-photo .placeholder span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:64px;color:#000}
  @media(max-width:640px){.author-bio-card{grid-template-columns:1fr}.author-bio-img{width:100px}.author-bio-img img,.author-bio-img .placeholder{width:100px;height:100px}}

  /* Post images */
  .article-body .post-image{margin:0 0 36px;border:1px solid var(--border);overflow:hidden;background:var(--bg3)}
  .article-body .post-image-hero{margin-bottom:48px;border-left:3px solid var(--accent)}
  .article-body .post-image-mid{margin:48px 0;border-left:3px solid var(--accent2)}
  .article-body .svg-wrapper{width:100%;overflow:hidden;line-height:0;display:block}
  .article-body .svg-wrapper svg{width:100%;height:auto;display:block;max-height:480px}
  .article-body figcaption{font-family:var(--font-mono);font-size:13px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg2)}

  .article-body h2{font-family:var(--font-display);font-size:clamp(28px,3vw,38px);color:var(--text);margin:48px 0 18px;letter-spacing:1px;line-height:1;padding-top:48px;border-top:1px solid var(--border)}
  .article-body h2:first-of-type{border-top:none;padding-top:0}

  /* KEY TAKEAWAYS */
  .article-body .key-takeaways{background:var(--bg3);border-left:3px solid var(--accent);padding:24px 28px;margin:36px 0;position:relative}
  .article-body .key-takeaways::before{content:'KEY TAKEAWAYS';position:absolute;top:-1px;left:28px;background:var(--accent);color:#000;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 12px;transform:translateY(-100%)}
  .article-body .key-takeaways h3{display:none}
  .article-body .key-takeaways ul{list-style:none;display:flex;flex-direction:column;gap:12px}
  .article-body .key-takeaways li{font-size:17px;color:var(--text);display:flex;align-items:flex-start;gap:12px;line-height:1.5}
  .article-body .key-takeaways li::before{content:'→';color:var(--accent);flex-shrink:0;font-family:var(--font-mono);font-weight:700;margin-top:1px}

  /* IN-POST PROMO */
  .in-post-promo{background:linear-gradient(135deg,#0d0d00,#111100);border:1px solid rgba(232,255,0,.2);padding:24px;margin:40px 0}
  .in-post-promo-label{font-family:var(--font-mono);font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}

var maintenanceServices = {};
async function loadMaintenanceStatus() {
  try {
    var res = await db.from('settings').select('key, value').like('key', 'maint_%');
    if (res.data) {
      res.data.forEach(function(row) {
        maintenanceServices[row.key] = row.value;
      });
    }
    // Intercept clicks on product links
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a[href]');
      if (!link) return;
      var href = link.getAttribute('href') || '';
      var blocked = false;
      var serviceName = '';
      
      if (href.indexOf('youtubereports') !== -1 && maintenanceServices['maint_reports'] === 'down') {
        blocked = true; serviceName = 'YouTube Reports';
      } else if (href.indexOf('andines.pythonanywhere') !== -1 && maintenanceServices['maint_toolkit'] === 'down') {
        blocked = true; serviceName = 'Free Starter Toolkit';
      } else if (href.indexOf('youtube-mastery-academy') !== -1 && maintenanceServices['maint_academy'] === 'down') {
        blocked = true; serviceName = 'YouTube Mastery Academy';
      }
      
      if (blocked) {
        e.preventDefault();
        e.stopPropagation();
        var customMsg = maintenanceServices['maint_message'] || "We'll be back shortly. Thanks for your patience!";
        showMaintenanceModal(serviceName, customMsg);
      }
    });
  } catch(e) {}
}

// ═══ READING PROGRESS BAR ═══
window.addEventListener('scroll', function() {
  var article = document.querySelector('.article-body');
  if (!article) return;
  var rect = article.getBoundingClientRect();
  var articleTop = window.scrollY + rect.top;
  var articleHeight = rect.height;
  var scrolled = window.scrollY - articleTop;
  var pct = Math.max(0, Math.min(100, (scrolled / articleHeight) * 100));
  document.getElementById('readingProgress').style.width = pct + '%';
  
  // Show/hide floating tools after scrolling past first paragraph
  var tools = document.getElementById('floatTools');
  if (tools) tools.style.display = window.scrollY > 300 ? 'flex' : 'none';
  
  // Update reading time countdown
  var timeEl = document.getElementById('floatTime');
  if (timeEl && article) {
    var readTimeAttr = document.querySelector('.article-meta');
    var totalMin = 7; // default
    var match = document.body.innerHTML.match(/(\d+)\s*min read/);
    if (match) totalMin = parseInt(match[1]);
    var minsLeft = Math.max(1, Math.round(totalMin * (1 - pct / 100)));
    if (pct >= 95) {
      timeEl.textContent = '✓ Done';
    } else {
      timeEl.textContent = minsLeft + ' min';
    }
  }
});

// ═══ FLOATING TABLE OF CONTENTS ═══
function buildFloatTOC() {
  var headings = document.querySelectorAll('.article-body h2');
  if (!headings.length) return;
  var panel = document.getElementById('floatTocPanel');
  var html = '';
  headings.forEach(function(h, i) {
    h.id = h.id || 'section-' + i;
    html += '<a href="#' + h.id + '" onclick="closeFloatTOC()">' + h.textContent + '</a>';
  });
  panel.innerHTML = html;
}

function toggleFloatTOC() {
  var panel = document.getElementById('floatTocPanel');
  panel.classList.toggle('open');
}

function closeFloatTOC() {
  document.getElementById('floatTocPanel').classList.remove('open');
}

// Build TOC after article loads

  }
});

// ═══ DARK / LIGHT MODE TOGGLE ═══
function toggleTheme() {
  var body = document.body;
  var btn = document.getElementById('themeToggle');
  if (body.classList.contains('light')) {
    body.classList.remove('light');
    btn.textContent = '☀';
    btn.title = 'Switch to light mode';
    localStorage.setItem('ae_theme', 'dark');
  } else {
    body.classList.add('light');
    btn.textContent = '🌙';
    btn.title = 'Switch to dark mode';
    localStorage.setItem('ae_theme', 'light');
  }
}

// ── CREATE SILENT AUDIO — keeps browser alive in background ──
function createSilentAudio() {
  if (silentAudioCreated) return;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var bufferSize = ctx.sampleRate * 60; // 60 seconds of silence
    var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    // Fill with near-silence (not absolute zero — some browsers detect and ignore true silence)
    var data = buffer.getChannelData(0);
    for (var i = 0; i < bufferSize; i++) {
      data[i] = Math.random() * 0.0001 - 0.00005; // imperceptible noise
    }
    // Convert to WAV blob
    var wavBlob = bufferToWav(buffer, ctx.sampleRate);
    var url = URL.createObjectURL(wavBlob);
    var el = document.getElementById('silentAudio');
    if (el) {
      el.src = url;
      el.volume = 0.01; // nearly silent
      silentAudioCreated = true;
    }
    ctx.close();
  } catch(e) {
    // AudioContext not supported — fall back to basic approach
  }
}

function bufferToWav(buffer, sampleRate) {
  var length = buffer.getChannelData(0).length;
  var arrayBuffer = new ArrayBuffer(44 + length * 2);
  var view = new DataView(arrayBuffer);
  var data = buffer.getChannelData(0);
  // WAV header
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + length * 2, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, 1, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);
  view.setUint16(34, 16, true);
  writeString(view, 36, 'data');
  view.setUint32(40, length * 2, true);
  for (var i = 0; i < length; i++) {
    var s = Math.max(-1, Math.min(1, data[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([arrayBuffer], { type: 'audio/wav' });
}

function writeString(view, offset, str) {
  for (var i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

// ── VOICE SELECTION ──
function pickBestVoice() {
  var voices = audioSynth.getVoices();
  if (!voices.length) return null;
  var priority = [
    'Samantha (Enhanced)', 'Samantha', 'Alex', 'Daniel', 'Karen', 'Moira', 'Tessa',
    'Google UK English Female', 'Google UK English Male', 'Google US English',
    'Microsoft Aria Online', 'Microsoft Jenny Online', 'Microsoft Guy Online',
    'Microsoft Aria', 'Microsoft Jenny', 'Microsoft Guy',
    'Microsoft Mark', 'Microsoft Zira', 'Microsoft David'
  ];
  for (var p = 0; p < priority.length; p++) {
    for (var v = 0; v < voices.length; v++) {
      if (voices[v].name.indexOf(priority[p]) !== -1) return voices[v];
    }
  }
  var keywords = ['Natural', 'Neural', 'Premium', 'Enhanced', 'Online'];
  for (var k = 0; k < keywords.length; k++) {
    for (var v2 = 0; v2 < voices.length; v2++) {
      if (voices[v2].name.indexOf(keywords[k]) !== -1 && voices[v2].lang.indexOf('en') !== -1) return voices[v2];
    }
  }
  var en = voices.filter(function(v) { return v.lang.indexOf('en') !== -1 && v.name.indexOf('Compact') === -1; });
  return en[0] || voices[0];
}

function initVoices() {
  var voices = audioSynth.getVoices();
  if (voices.length) {
    selectedVoice = pickBestVoice();
    voicesLoaded = true;
    var status = document.getElementById('audioStatus');
    if (status && !audioPlaying) {
      var name = selectedVoice ? selectedVoice.name.split('(')[0].trim() : 'Default';
      if (name.length > 20) name = name.substring(0, 20);
      status.textContent = 'Ready — voice: ' + name;
    }
  }
}
initVoices();
if (audioSynth.onvoiceschanged !== undefined) audioSynth.onvoiceschanged = initVoices;
setTimeout(initVoices, 500);
setTimeout(initVoices, 2000);

// ── TEXT + CHUNKING ──
function getArticleText() {
  var body = document.querySelector('.article-body');
  if (!body) return '';
  var clone = body.cloneNode(true);
  clone.querySelectorAll('.in-post-promo, .key-takeaways, figure, .faq-item, .related-reading').forEach(function(el) { el.remove(); });
  return (clone.textContent || clone.innerText || '').replace(/\s+/g, ' ').trim();
}

function chunkText(text) {
  var chunks = [];
  var sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
  var current = '';
  for (var i = 0; i < sentences.length; i++) {
    if ((current + sentences[i]).length > 800 && current.length > 0) {
      chunks.push(current.trim());
      current = sentences[i];
    } else {
      current += ' ' + sentences[i];
    }
  }
  if (current.trim()) chunks.push(current.trim());
  return chunks;
}

// ── WAKE LOCK ──
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { try { wakeLock.release(); } catch(e) {} wakeLock = null; }
}

// ── MEDIA SESSION — Shows controls on lock screen ──
function setMediaSession(title) {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title || 'Andre Explains Article',
      artist: 'Andre Explains',
      album: 'Blog Articles'
    });
    navigator.mediaSession.setActionHandler('play', function() { if (audioPaused) toggleAudio(); });
    navigator.mediaSession.setActionHandler('pause', function() { if (audioPlaying && !audioPaused) toggleAudio(); });
    navigator.mediaSession.setActionHandler('seekbackward', function() { rewindAudio(); });
    navigator.mediaSession.setActionHandler('seekforward', function() { forwardAudio(); });
  }
}

// ── SPEAK CHUNK ──
function speakChunk(index) {
  if (index >= audioTextChunks.length) {
    stopAudio();
    document.getElementById('audioStatus').textContent = 'Finished — tap play to listen again';
    document.getElementById('audioProgress').style.width = '100%';
    return;
  }
  audioCurrentChunk = index;
  var utterance = new SpeechSynthesisUtterance(audioTextChunks[index]);
  utterance.rate = audioSpeed;
  utterance.pitch = 1.0;
  utterance.lang = 'en-US';
  if (selectedVoice) {
    utterance.voice = selectedVoice;
    if (selectedVoice.name.indexOf('Natural') === -1 && selectedVoice.name.indexOf('Neural') === -1 &&
        selectedVoice.name.indexOf('Enhanced') === -1 && selectedVoice.name.indexOf('Samantha') === -1) {
      utterance.pitch = 1.03;
      utterance.rate = audioSpeed * 0.97;
    }
  }
  
  utterance.onend = function() {
    if (audioPlaying && !audioPaused) {
      var pct = Math.round(((index + 1) / audioTotalChunks) * 100);
      document.getElementById('audioProgress').style.width = pct + '%';
      updateTimeDisplay(pct);
      // Seamless transition — 100ms pause sounds like natural breath
      setTimeout(function() {
        if (audioPlaying && !audioPaused) speakChunk(index + 1);
      }, 100);
    }
  };
  utterance.onerror = function(e) {
    if (e.error !== 'canceled' && e.error !== 'interrupted' && audioPlaying) {
      setTimeout(function() { speakChunk(index + 1); }, 200);
    }
  };
  
  audioSynth.speak(utterance);
  var pct = Math.round((index / audioTotalChunks) * 100);
  document.getElementById('audioProgress').style.width = pct + '%';
  updateTimeDisplay(pct);
  
  var voiceName = selectedVoice ? selectedVoice.name.split('(')[0].split(' ').slice(0,2).join(' ').trim() : '';
  var minsLeft = Math.max(1, Math.round(((audioTotalChunks - index) / audioTotalChunks) * parseInt(document.getElementById('audioPlayer').dataset.readtime || 7)));
  document.getElementById('audioStatus').textContent = 'Playing... ~' + minsLeft + ' min left' + (voiceName ? ' (' + voiceName + ')' : '');
}

function updateTimeDisplay(pct) {
  var el = document.getElementById('audioTime');
  if (!el) return;
  var totalMin = parseInt(document.getElementById('audioPlayer').dataset.readtime || 7);
  var elapsed = Math.round(totalMin * pct / 100);
  el.textContent = elapsed + ':00 / ' + totalMin + ':00';
}

// ── CONTROLS ──
function toggleAudio() {
  var btn = document.getElementById('audioPlayBtn');
  var rwBtn = document.getElementById('audioRewindBtn');
  var fwBtn = document.getElementById('audioForwardBtn');
  var timeEl = document.getElementById('audioTime');
  
  if (audioPlaying && !audioPaused) {
    // PAUSE
    audioSynth.pause();
    audioPaused = true;
    btn.textContent = '▶ RESUME';
    btn.classList.remove('playing');
    document.getElementById('audioStatus').textContent = 'Paused';
    var silent = document.getElementById('silentAudio');
    if (silent) silent.pause();
    releaseWakeLock();
    
  } else if (audioPaused) {
    // RESUME
    audioSynth.resume();
    audioPaused = false;
    btn.textContent = '⏸ PAUSE';
    btn.classList.add('playing');
    document.getElementById('audioStatus').textContent = 'Resuming...';
    var silent = document.getElementById('silentAudio');
    if (silent) try { silent.play(); } catch(e) {}
    requestWakeLock();
    
    // Chrome resume bug — if resume doesn't work, restart chunk
    setTimeout(function() {
      if (audioPlaying && !audioPaused && !audioSynth.speaking) {
        audioSynth.cancel();
        setTimeout(function() { speakChunk(audioCurrentChunk); }, 50);
      }
    }, 1000);
    
  } else {
    // START
    if (!voicesLoaded) initVoices();
    var text = getArticleText();
    if (!text) { document.getElementById('audioStatus').textContent = 'No article text found'; return; }
    
    audioSynth.cancel();
    createSilentAudio();
    
    audioTextChunks = chunkText(text);
    audioTotalChunks = audioTextChunks.length;
    audioCurrentChunk = 0;
    audioPlaying = true;
    audioPaused = false;
    
    btn.textContent = '⏸ PAUSE';
    btn.classList.add('playing');
    rwBtn.style.display = 'inline-flex';
    fwBtn.style.display = 'inline-flex';
    timeEl.style.display = 'block';
    
    // Start silent audio to keep browser alive
    var silent = document.getElementById('silentAudio');
    if (silent && silent.src) try { silent.play(); } catch(e) {}
    
    requestWakeLock();
    setMediaSession(document.querySelector('.article-title')?.textContent || 'Article');
    
    setTimeout(function() { speakChunk(0); }, 100);
  }
}

function stopAudio() {
  audioSynth.cancel();
  audioPlaying = false;
  audioPaused = false;
  audioCurrentChunk = 0;
  releaseWakeLock();
  var silent = document.getElementById('silentAudio');
  if (silent) silent.pause();
  var btn = document.getElementById('audioPlayBtn');
  if (btn) { btn.textContent = '▶ PLAY'; btn.classList.remove('playing'); }
  document.getElementById('audioRewindBtn').style.display = 'none';
  document.getElementById('audioForwardBtn').style.display = 'none';
  document.getElementById('audioTime').style.display = 'none';
  initVoices(); // Reset voice display
}

function rewindAudio() {
  if (!audioPlaying) return;
  var target = Math.max(0, audioCurrentChunk - 1);
  audioSynth.cancel();
  audioPaused = false;
  document.getElementById('audioPlayBtn').textContent = '⏸ PAUSE';
  document.getElementById('audioPlayBtn').classList.add('playing');
  setTimeout(function() { speakChunk(target); }, 100);
}

function forwardAudio() {
  if (!audioPlaying) return;
  var target = Math.min(audioTotalChunks - 1, audioCurrentChunk + 1);
  audioSynth.cancel();
  audioPaused = false;
  document.getElementById('audioPlayBtn').textContent = '⏸ PAUSE';
  document.getElementById('audioPlayBtn').classList.add('playing');
  setTimeout(function() { speakChunk(target); }, 100);
}

function cycleSpeed() {
  audioSpeedIndex = (audioSpeedIndex + 1) % audioSpeeds.length;
  audioSpeed = audioSpeeds[audioSpeedIndex];
  document.getElementById('audioSpeedBtn').textContent = audioSpeed + 'x';
  if (audioPlaying && !audioPaused) {
    audioSynth.cancel();
    setTimeout(function() { speakChunk(audioCurrentChunk); }, 100);
  }
}

function seekAudio(e) {
  if (!audioTextChunks.length) return;
  var bar = e.currentTarget;
  var rect = bar.getBoundingClientRect();
  var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  var targetChunk = Math.floor(pct * audioTotalChunks);
  
  audioSynth.cancel();
  audioPlaying = true;
  audioPaused = false;
  document.getElementById('audioPlayBtn').textContent = '⏸ PAUSE';
  document.getElementById('audioPlayBtn').classList.add('playing');
  document.getElementById('audioRewindBtn').style.display = 'inline-flex';
  document.getElementById('audioForwardBtn').style.display = 'inline-flex';
  document.getElementById('audioTime').style.display = 'block';
  
  var silent = document.getElementById('silentAudio');
  if (silent && silent.src) try { silent.play(); } catch(e2) {}
  requestWakeLock();
  setTimeout(function() { speakChunk(targetChunk); }, 100);
}

// ── BACKGROUND RECOVERY ──
// If speech dies for any reason, detect and restart
setInterval(function() {
  if (audioPlaying && !audioPaused && !audioSynth.speaking && !audioSynth.paused && audioCurrentChunk < audioTotalChunks) {
    audioSynth.cancel();
    setTimeout(function() {
      if (audioPlaying && !audioPaused && !audioSynth.speaking) {
        speakChunk(audioCurrentChunk);
      }
    }, 200);
  }
}, 3000);

// When user returns to tab/app
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && audioPlaying && !audioPaused) {
    requestWakeLock();
    if (!audioSynth.speaking && !audioSynth.paused) {
      setTimeout(function() {
        if (audioPlaying && !audioPaused && !audioSynth.speaking) {
          speakChunk(audioCurrentChunk);
        }
      }, 300);
    }
  }
});

window.addEventListener('focus', function() {
  if (audioPlaying && !audioPaused && !audioSynth.speaking && !audioSynth.paused) {
    setTimeout(function() {
      if (audioPlaying && !audioPaused && !audioSynth.speaking) speakChunk(audioCurrentChunk);
    }, 200);
  }
});

// Browser doesn't support speech at all
if (!window.speechSynthesis) {
  var p = document.getElementById('audioPlayer');
  if (p) p.innerHTML = '<div class="audio-player-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg></div><div class="audio-player-info"><div class="audio-player-label">Listen to This Article</div><div class="audio-player-status">Audio not supported on this browser. Try Chrome or Safari.</div></div>';
}
